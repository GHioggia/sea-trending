        let currentPlatform = 'all';
        let currentCountry = 'all';
        let currentCategory = 'all';

        function filterPlatform(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.filter-row:nth-child(1) .filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            applyFilters();
        }

        function filterCountry(country) {
            currentCountry = country;
            document.querySelectorAll('.filter-row:nth-child(2) .filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            applyFilters();
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.filter-row:nth-child(3) .category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            // Filter data
            const filtered = allData.filter(item => {
                const matchPlatform = currentPlatform === 'all' || item.platform === currentPlatform;
                const matchCountry = currentCountry === 'all' || item.country === currentCountry;
                const matchCategory = currentCategory === 'all' || item.category === currentCategory;
                return matchPlatform && matchCountry && matchCategory;
            });

            // Update results info
            updateResultsInfo(filtered.length);

            // Render cards
            renderCards(filtered);
        }

        function updateResultsInfo(count) {
            document.getElementById('result-count').textContent = count;
            const tagsContainer = document.getElementById('active-tags');
            tagsContainer.innerHTML = '';

            if (currentPlatform !== 'all') {
                const platformNames = { google: 'Google', tiktok: 'TikTok', twitter: 'X', facebook: 'Facebook' };
                addTag(tagsContainer, platformNames[currentPlatform] || currentPlatform);
            }
            if (currentCountry !== 'all') {
                const countryNames = { id: '印尼', th: '泰国', ph: '菲律宾' };
                addTag(tagsContainer, countryNames[currentCountry] || currentCountry);
            }
            if (currentCategory !== 'all') {
                const categoryNames = {
                    gaming: '游戏', entertainment: '轻娱乐', 'social-challenge': '社交挑战',
                    horror: '恐怖', 'light-horror': '泛恐怖', meme: '剧情梗',
                    'music-meme': '音乐梗', movie: '影视', animation: '动画', other: '其他'
                };
                addTag(tagsContainer, categoryNames[currentCategory] || currentCategory);
            }

            // Show/hide no results
            const noResults = document.getElementById('no-results');
            if (count === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
            }
        }

        function addTag(container, text) {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.textContent = text;
            container.appendChild(tag);
        }

        function renderCards(data) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            if (data.length === 0) {
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.platform = item.platform;
                card.dataset.country = item.country;
                card.dataset.category = item.category;

                const platformIcons = {
                    google: 'G', tiktok: '♪', twitter: '𝕏', facebook: 'f', news: 'N'
                };

                const topicsHtml = item.topics.map(topic => `
                    <li class="topic-item">
                        <span class="rank">${topic.rank}</span>
                        <div class="topic-content">
                            <div class="topic-original">${topic.original}</div>
                            <div class="topic-translation">${topic.translation}</div>
                        </div>
                        <a href="${topic.link}" target="_blank" class="topic-link">
                            详情<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                                <polyline points="15 3 21 3 21 9"/>
                                <line x1="10" y1="14" x2="21" y2="3"/>
                            </svg>
                        </a>
                        <span class="volume ${topic.volume === '热门' || topic.volume.includes('亿') || topic.volume.includes('万') && parseInt(topic.volume) > 100 ? 'high' : ''} ${topic.volume.includes('万') && parseInt(topic.volume) <= 100 && parseInt(topic.volume) > 10 ? 'medium' : ''}">${topic.volume}</span>
                    </li>
                `).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="platform-icon ${item.platform}">${platformIcons[item.platform] || '?'}</div>
                        <span class="card-title">${item.title}</span>
                        <span class="card-country">${item.countryName}</span>
                        <span class="card-category ${item.category}">${item.categoryName}</span>
                    </div>
                    <ul class="topic-list">
                        ${topicsHtml}
                    </ul>
                `;

                container.appendChild(card);
            });
        }

        // Initial render
        applyFilters();
    </script>
